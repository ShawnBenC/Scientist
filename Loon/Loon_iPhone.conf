日本节点 = NameRegex, FilterKey = "(?i)^(?=.*(日本|JP|Japan))(?!(.*(手游|游戏|倍|game))).*$"
韩国节点 = NameRegex, FilterKey = "(?i)^(?=.*(韩国|韓國|南朝鲜|KR|Korea|Korean))(?!(.*(手游|游戏|倍|game))).*$"
美国节点 = NameRegex, FilterKey = "(?i)^(?=.*(美国|美國|US|States|American))(?!(.*(手游|游戏|倍|game))).*$"
