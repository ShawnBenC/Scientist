[General]
# Quantumult X: server_check_url=http://captive.apple.com/
internet-test-url = http://captive.apple.com/
proxy-test-url = http://captive.apple.com/
test-timeout = 5
interface-mode = auto

# Quantumult X 禁用 IPv6: no-ipv6
ip-mode = ipv4-only
ipv6-vif = off
sni-sniffing = true
disable-stun = true
domain-reject-mode = DNS
dns-reject-mode = LoopbackIP
disconnect-on-policy-change = false

bypass-tun = 10.0.0.0/8,100.64.0.0/10,127.0.0.0/8,169.254.0.0/16,172.16.0.0/12,192.0.0.0/24,192.0.2.0/24,192.88.99.0/24,192.168.0.0/16,198.18.0.0/15,198.51.100.0/24,203.0.113.0/24,224.0.0.0/4,255.255.255.255/32

# DNS
dns-server = 119.29.29.29,223.5.5.5,114.114.114.114,1.0.0.1,8.8.8.8
doh-server = https://doh.pub/dns-query,https://223.5.5.5/dns-query,https://dns.cloudflare.com/dns-query,https://dns.google/dns-query

# UDP / Wi-Fi 访问
allow-udp-proxy = false
udp-fallback-mode = REJECT
allow-wifi-access = false
wifi-access-http-port = 7222
wifi-access-socks5-port = 7221

